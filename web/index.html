<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1.00001,viewport-fit=cover" />
  <meta name="theme-color" content="#0A0A0C" />
  <title>Qupay</title>
  <!-- Google Fonts — Inter full weight range for the app -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* Map expo-google-fonts names to CSS font-family */
    html, body, #root {
      height: 100%;
      margin: 0;
      padding: 0;
      background-color: #0A0A0C;
      overflow: hidden;
    }
    /* Ensure Inter maps correctly for React Native Web */
    @font-face { font-family: 'Inter_400Regular'; src: local('Inter'), local('Inter-Regular'); font-weight: 400; }
    @font-face { font-family: 'Inter_500Medium'; src: local('Inter'), local('Inter-Medium'); font-weight: 500; }
    @font-face { font-family: 'Inter_600SemiBold'; src: local('Inter'), local('Inter-SemiBold'); font-weight: 600; }
    @font-face { font-family: 'Inter_700Bold'; src: local('Inter'), local('Inter-Bold'); font-weight: 700; }
    @font-face { font-family: 'Inter_800ExtraBold'; src: local('Inter'), local('Inter-ExtraBold'); font-weight: 800; }

    /* Remove ugly browser focus styles on inputs */
    input, textarea, select, button {
      outline: none !important;
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
    }
    input:focus, textarea:focus, select:focus {
      outline: none !important;
      box-shadow: none !important;
    }
    /* Remove autofill background color */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active {
      -webkit-box-shadow: 0 0 0 30px #1F1F23 inset !important;
      -webkit-text-fill-color: #FFFFFF !important;
      caret-color: #38BDF8;
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
