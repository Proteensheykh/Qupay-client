<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Concentric arcs radiating from center, flat SVG celebration -->
  <g fill="none" stroke-linecap="round" opacity="0.7">
    <circle cx="100" cy="100" r="30" stroke="#9E79D2" stroke-width="3"/>
    <circle cx="100" cy="100" r="50" stroke="#9E79D2" stroke-width="2" opacity="0.5"/>
    <circle cx="100" cy="100" r="70" stroke="#9E79D2" stroke-width="1.5" opacity="0.3"/>
    <circle cx="100" cy="100" r="90" stroke="#B893EC" stroke-width="1" opacity="0.15"/>
  </g>
  <!-- Checkmark -->
  <path d="M82 100 L95 113 L120 88" stroke="#F3C23D" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
